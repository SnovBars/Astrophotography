name: Build iOS IPA (unsigned)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15  # Используем актуальную macOS 15 с Xcode 16+
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Xcode version
        run: xcodebuild -version  # Просто проверяем, какая версия Xcode стоит по умолчанию

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Clean and build for iOS device (Release)
        run: |
          xcodebuild clean build \
            -project Astrophotography.xcodeproj \
            -scheme Astrophotography \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath DerivedData

      - name: Create Payload folder and copy .app
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/Astrophotography.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

      - name: Package IPA
        run: |
          zip -r Astrophotography.ipa Payload/

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrophotography-unsigned
          path: Astrophotography.ipa
          if-no-files-found: error