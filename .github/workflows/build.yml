name: Build iOS IPA (unsigned)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # позволяет запускать вручную из интерфейса

jobs:
  build:
    runs-on: macos-14   # macOS Sonoma с Xcode 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Clean and build for iOS device (Release)
        run: |
          xcodebuild clean build \
            -project Astrophotography.xcodeproj \
            -scheme Astrophotography \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath DerivedData

      - name: Create Payload folder and copy .app
        run: |
          APP_PATH="DerivedData/Build/Products/Release-iphoneos/Astrophotography.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found at $APP_PATH"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ls -la Payload/

      - name: Package IPA
        run: |
          zip -r Astrophotography.ipa Payload/
          ls -la *.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Astrophotography-unsigned
          path: Astrophotography.ipa
          if-no-files-found: error